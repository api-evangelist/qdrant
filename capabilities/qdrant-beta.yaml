naftiko: 1.0.0-alpha2
info:
  label: Qdrant API — Beta
  description: 'Qdrant API — Beta. 2 operations. Lead operation: Get issues. Self-contained Naftiko capability covering one
    Qdrant business surface.'
  tags:
  - Qdrant
  - Beta
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QDRANT_API_KEY: QDRANT_API_KEY
capability:
  consumes:
  - type: http
    namespace: qdrant-beta
    baseUri: ''
    description: Qdrant API — Beta business capability. Self-contained, no shared references.
    resources:
    - name: issues
      path: /issues
      operations:
      - name: getissues
        method: GET
        description: Get issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: clearissues
        method: DELETE
        description: Clear issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QDRANT_API_KEY}}'
  exposes:
  - type: rest
    namespace: qdrant-beta-rest
    port: 8080
    description: REST adapter for Qdrant API — Beta. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/issues
      name: issues
      description: REST surface for issues.
      operations:
      - method: GET
        name: getissues
        description: Get issues
        call: qdrant-beta.getissues
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: clearissues
        description: Clear issues
        call: qdrant-beta.clearissues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: qdrant-beta-mcp
    port: 9090
    transport: http
    description: MCP adapter for Qdrant API — Beta. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-issues
      description: Get issues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: qdrant-beta.getissues
      outputParameters:
      - type: object
        mapping: $.
    - name: clear-issues
      description: Clear issues
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: qdrant-beta.clearissues
      outputParameters:
      - type: object
        mapping: $.
