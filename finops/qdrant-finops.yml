    description: Track Qdrant consumption monthly via admin/billing exports.
  - name: Allocation
    description: Tag usage to teams or cost centers for chargeback.
  - name: Optimization
    description: Right-size models/tiers; use caching and batching.
  - name: Accountability
    description: Set hard spend limits; quarterly review.
